name: Deploy Application

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile"
      - "pyproject.toml"
  workflow_call:
    inputs:
      environment-name:
        type: string
        required: false
        default: "travelbot"
  workflow_dispatch:
    inputs:
      environment-name:
        description: "Deployment environment name"
        required: true
        default: "travelbot"

permissions:
  id-token: write
  contents: read
  packages: write

env:
  ENVIRONMENT_NAME: ${{ inputs.environment-name || 'travelbot' }}
  RESOURCE_GROUP: rg-${{ inputs.environment-name || 'travelbot' }}
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        run: |
          IMAGE="${GHCR_IMAGE}:${{ github.sha }}"
          docker build -t "$IMAGE" -t "${GHCR_IMAGE}:latest" .
          docker push "$IMAGE"
          docker push "${GHCR_IMAGE}:latest"
          # NOTE: After first push, set GHCR package visibility to public at:
          # https://github.com/users/${{ github.repository_owner }}/packages/container/groupmetravelbot/settings

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Container App name
        id: infra
        run: |
          DEPLOYMENT=$(az deployment group list \
            -g "$RESOURCE_GROUP" \
            --query "[?properties.provisioningState=='Succeeded'] | sort_by(@, &properties.timestamp) | [-1].name" \
            -o tsv)

          if [ -z "$DEPLOYMENT" ]; then
            echo "::error::No successful infrastructure deployment found. Run infra-deploy first."
            exit 1
          fi

          CONTAINER_APP_NAME=$(az deployment group show \
            -g "$RESOURCE_GROUP" -n "$DEPLOYMENT" \
            --query "properties.outputs.containerAppName.value" -o tsv)

          echo "containerAppName=$CONTAINER_APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Update Container App
        run: |
          az containerapp update \
            -n "${{ steps.infra.outputs.containerAppName }}" \
            -g "$RESOURCE_GROUP" \
            --image "${GHCR_IMAGE}:${{ github.sha }}"
