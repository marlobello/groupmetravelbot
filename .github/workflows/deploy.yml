name: Deploy

# Single entry point for deployments. Path filtering decides whether to deploy
# infrastructure and/or the application, so a push that touches both infra/** and
# src/** no longer triggers two competing app deployments (which previously raced
# on `az containerapp update`). A concurrency group serialises deploys.

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "src/**"
      - "Dockerfile"
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment name"
        required: true
        default: "travelbot"

permissions:
  id-token: write
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  ENVIRONMENT_NAME: ${{ github.event.inputs.environment || 'travelbot' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        run: |
          set -euo pipefail

          # Manual runs deploy everything.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "infra=true" >> "$GITHUB_OUTPUT"
            echo "app=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ] || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            BASE="$(git rev-parse HEAD~1 2>/dev/null || echo '')"
          fi

          if [ -n "$BASE" ]; then
            CHANGED="$(git diff --name-only "$BASE" "${{ github.sha }}")"
          else
            CHANGED="$(git show --name-only --pretty=format: "${{ github.sha }}")"
          fi

          echo "Changed files:"
          echo "$CHANGED"

          infra=false
          app=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              infra/*) infra=true ;;
              src/*|Dockerfile|pyproject.toml) app=true ;;
            esac
          done <<< "$CHANGED"

          echo "infra=$infra" >> "$GITHUB_OUTPUT"
          echo "app=$app" >> "$GITHUB_OUTPUT"

  deploy-infra:
    needs: changes
    if: ${{ needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: create
          name: ${{ env.ENVIRONMENT_NAME }}-${{ github.run_id }}
          scope: resourceGroup
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: rg-${{ env.ENVIRONMENT_NAME }}
          template-file: infra/main.bicep
          parameters: |
            {
              "environmentName": "${{ env.ENVIRONMENT_NAME }}",
              "groupmeBotId": "${{ secrets.GROUPME_BOT_ID }}",
              "webhookSecret": "${{ secrets.WEBHOOK_SECRET }}",
              "webAccessKey": "${{ secrets.WEB_ACCESS_KEY }}"
            }

  deploy-app:
    needs: [changes, deploy-infra]
    # Deploy the app when app files changed, or when infra changed (infra deploys
    # can alter the container app spec). Runs after infra so they never overlap.
    if: ${{ always() && (needs.changes.outputs.app == 'true' || needs.changes.outputs.infra == 'true') && needs.deploy-infra.result != 'failure' && needs.deploy-infra.result != 'cancelled' }}
    uses: ./.github/workflows/app-deploy.yml
    with:
      environment-name: ${{ github.event.inputs.environment || 'travelbot' }}
    secrets: inherit
