name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment name"
        required: true
        default: "travelbot"

permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT_NAME: ${{ github.event.inputs.environment || 'travelbot' }}

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: rg-${{ env.ENVIRONMENT_NAME }}
          template: infra/main.bicep
          parameters: >
            environmentName=${{ env.ENVIRONMENT_NAME }}
            groupmeBotId=${{ secrets.GROUPME_BOT_ID }}

  deploy-app:
    needs: deploy-infra
    uses: ./.github/workflows/app-deploy.yml
    with:
      environment-name: ${{ github.event.inputs.environment || 'travelbot' }}
    secrets: inherit
